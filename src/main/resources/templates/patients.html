<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MiniClinic - 病歷資料</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">MiniClinic</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">首頁</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/patients">病歷資料</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>病患清單</h2>
        <hr>
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>病歷號</th>
                    <th>姓名</th>
                    <th>性別</th>
                    <th>出生日期</th>
                    <th>聯絡電話</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="patient : ${patients}">
                    <td th:text="${patient.chartNo}">TEST00000</td>
                    <td th:text="${patient.name}">Name</td>
                    <td th:text="${patient.gender}">Gender</td>
                    <td th:text="${patient.birthDate}">2000-01-01</td>
                    <td th:text="${patient.phone}">Phone</td>
                </tr>
            </tbody>
        </table>
        <div class="mt-3">
            <a href="/dashboard" class="btn btn-secondary">返回控制台</a>
        </div>
    </div>
</body>
</html>
