<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MiniClinic - 數據統計</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">MiniClinic</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首頁</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/stats">統計報表</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>掛號統計概況</h2>
        <hr>
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white bg-info">
                    <div class="card-body text-center">
                        <h5 class="card-title">醫師總數</h5>
                        <p class="card-text fs-1" th:text="${doctorCount}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success">
                    <div class="card-body text-center">
                        <h5 class="card-title">病患總數</h5>
                        <p class="card-text fs-1" th:text="${patientCount}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-warning">
                    <div class="card-body text-center">
                        <h5 class="card-title">掛號總數</h5>
                        <p class="card-text fs-1" th:text="${apptCount}">0</p>
                    </div>
                </div>
            </div>
        </div>

        <h4>依科別統計掛號數</h4>
        <table class="table table-bordered table-striped mt-3">
            <thead class="table-dark">
                <tr><th>科別名稱</th><th>目前掛號人數</th></tr>
            </thead>
            <tbody>
                <tr th:each="row : ${deptStats}">
                    <td th:text="${row[0]}">科別</td>
                    <td th:text="${row[1]}">0</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
